<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fotos Frente e Trás</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h2>📸 Foto Frontal + Traseira</h2>

  <video id="video" autoplay playsinline></video>
  <button onclick="captureBoth()">Tirar e enviar 2 fotos</button>
  <canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
let currentStream = null;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ8iPf8fZ1iJ4q79mLQbKHXv4isuBhy92FaNLB-Q2LAIQYuiqb3ZB_c62bWTDMZIlEKQ/exec";

async function startCamera(mode) {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode }
  });

  video.srcObject = currentStream;

  // pequena espera para estabilizar a imagem
  await new Promise(resolve => setTimeout(resolve, 1000));
}

function captureImage() {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.8);
}

function sendImage(image, label) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({ image, label })
  });
}

async function captureBoth() {
  try {
    // 📸 traseira
    await startCamera("environment");
    const rear = captureImage();
    await sendImage(rear, "camera_traseira");

    // 🤳 frontal
    await startCamera("user");
    const front = captureImage();
    await sendImage(front, "camera_frontal");

    // volta para traseira
    await startCamera("environment");

    alert("✅ Fotos frontal e traseira enviadas");

  } catch (error) {
    console.error(error);
    alert("❌ Erro ao capturar ou enviar");
  }
}

// inicia preview traseiro
startCamera("environment");
</script>
</body>
</html>
