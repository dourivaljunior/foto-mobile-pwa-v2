<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Monitoramento em Tempo Real</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; background: #1e293b; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        video { width: 100%; border-radius: 12px; background: #000; margin-bottom: 10px; border: 1px solid #334155; }
        
        /* Área do Mapa na tela do celular */
        #map-display { width: 100%; height: 250px; border-radius: 12px; border: 2px solid #3b82f6; overflow: hidden; background: #000; margin-bottom: 10px; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.8; }
        
        .blue { background: #2563eb; }
        .green { background: #10b981; }
        .orange { background: #f59e0b; width: 100%; margin-top: 10px; } /* Botão do mapa abaixo do mapa */
        
        #status { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 10px; min-height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <video id="video" autoplay playsinline muted></video>

    <div class="btn-grid">
        <button class="blue" onclick="capturarFotos()">📸 FOTOS (F+T)</button>
        <button class="green" onclick="capturarVideo()">🎥 VÍDEO (3s)</button>
    </div>

    <div id="map-display">
        <div style="text-align:center; padding-top:100px; color:#475569;">Buscando satélites...</div>
    </div>

    <button class="orange" onclick="enviarLocalizacao()">📍 ENVIAR MAPA AO DRIVE</button>

    <div id="status">Iniciando sistema...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuAt3TNC7PfbRysSp8GXu750I4smVO5L3iNRfe-QrQJVHgMB_WRfKlUoDUom6-MrNzyg/exec";
    const v = document.getElementById("video");
    const st = document.getElementById("status");
    const mapArea = document.getElementById("map-display");
    let lat, lng, stream;

    // Monitoramento do GPS e atualização do mapa na tela
    function monitorarPosicao() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                lat = p.coords.latitude;
                lng = p.coords.longitude;
                st.innerText = `GPS Ativo: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                
                // Atualiza o mapa com o marcador (pin) na tela do celular
                const urlMapa = `https://www.google.com/maps?q=${lat},${lng}&z=17&output=embed`;
                mapArea.innerHTML = `<iframe src="${urlMapa}"></iframe>`;
            }, e => {
                st.innerText = "Erro GPS: Permissão negada.";
            }, { enableHighAccuracy: true });
        }
    }

    async function ligarCam(mode) {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
        v.srcObject = stream;
        await new Promise(r => setTimeout(r, 1000));
    }

    async function enviar(dados) {
        st.innerText = "Enviando dados...";
        dados.latitude = lat;
        dados.longitude = lng;
        dados.mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

        return fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(dados)
        }).then(() => st.innerText = "✅ Enviado com sucesso!");
    }

    async function capturarFotos() {
        const c = document.getElementById("canvas");
        const ctx = c.getContext("2d");

        await ligarCam("environment");
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "TRASEIRA"});

        await ligarCam("user");
        ctx.drawImage(v, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "FRONTAL"});
        
        await ligarCam("environment");
    }

    async function capturarVideo() {
        await ligarCam("environment");
        const chunks = [];
        const rec = new MediaRecorder(stream);
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => enviar({video: reader.result});
        };
        rec.start();
        setTimeout(() => rec.stop(), 3000);
    }

    function enviarLocalizacao() {
        if(!lat) return alert("Aguarde o GPS!");
        enviar({tipo: "mapa"});
    }

    // Início
    ligarCam("environment");
    monitorarPosicao();
</script>
</body>
</html>
