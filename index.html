<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura Automática</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    button {
      width: 100%;
      padding: 20px;
      font-size: 22px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      background: red;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <h2>📸🎥 Captura Automática</h2>
  <video id="video" autoplay playsinline muted></video>
  <button id="startBtn" onclick="startProcess()">🔴 INICIAR</button>
  <canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("startBtn");
let currentStream = null;
let running = false;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ8iPf8fZ1iJ4q79mLQbKHXv4isuBhy92FaNLB-Q2LAIQYuiqb3ZB_c62bWTDMZIlEKQ/exec";

async function startCamera(mode, audio=false) {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode },
    audio
  });

  video.srcObject = currentStream;
  await new Promise(resolve => setTimeout(resolve, 1000));
}

async function sendFile(payload) {
  await fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
}

function capturePhoto() {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.8);
}

async function recordVideo10s() {
  await startCamera("environment", true);

  return new Promise(resolve => {
    const chunks = [];
    const recorder = new MediaRecorder(currentStream);

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const reader = new FileReader();

      reader.onloadend = () => {
        resolve(reader.result);
      };

      reader.readAsDataURL(blob);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 2000);
  });
}

async function startProcess() {
  if (running) return;

  running = true;
  btn.style.background = "green";
  btn.innerText = "🟢 PROCESSANDO...";

  try {
    // 📸 traseira
    await startCamera("environment");
    const rear = capturePhoto();
    await sendFile({ image: rear, label: "camera_traseira" });

    // 🤳 frontal
    await startCamera("user");
    const front = capturePhoto();
    await sendFile({ image: front, label: "camera_frontal" });

    // 🎥 vídeo 10s
    const videoData = await recordVideo10s();
    await sendFile({ video: videoData, label: "video_10s" });

    alert("✅ Fotos e vídeo enviados com sucesso");

  } catch (error) {
    alert("❌ Erro: " + error.message);
  }

  btn.style.background = "red";
  btn.innerText = "🔴 INICIAR";
  running = false;

  await startCamera("environment");
}

startCamera("environment");
</script>
</body>
</html>
