<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Mobile</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        video { width: 100%; border-radius: 15px; background: #000; box-shadow: inset 0 0 10px #000; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-blue { background: #2563eb; }
        .btn-green { background: #059669; }
        .btn-gold { background: #d97706; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        #coords { font-size: 12px; color: #888; margin: 10px 0; background: #000; padding: 10px; border-radius: 10px; }
        #map-preview { width: 100%; height: 200px; border-radius: 15px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">📸 Monitoramento Ativo</h2>
    <video id="video" autoplay playsinline muted></video>
    
    <button class="btn btn-blue" onclick="captureBoth()">📸 CAPTURAR FOTOS (F + T)</button>
    <button class="btn btn-green" onclick="captureVideo()">🎥 GRAVAR VÍDEO CURTO</button>
    
    <div id="coords">📍 Localizando GPS...</div>
    <div id="map-preview"></div>
    
    <button class="btn btn-gold" onclick="sendMapOnly()">🗺️ ENVIAR MAPA AO DRIVE</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRes_BZrGLaLpBCFLnt3PZ6sHzxlf_q3JmN2diADGU/dev";
    const video = document.getElementById("video");
    const coordsDiv = document.getElementById("coords");
    let lat, lng, stream;

    // Inicialização da Câmera
    async function initCam(mode = "environment") {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}, audio: false});
        video.srcObject = stream;
    }

    // GPS em tempo real
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude;
        lng = p.coords.longitude;
        coordsDiv.innerHTML = `📍 Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)}`;
        document.getElementById("map-preview").innerHTML = `<iframe width="100%" height="100%" frameborder="0" style="border:0; border-radius:15px;" src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed"></iframe>`;
    });

    async function send(payload) {
        payload.latitude = lat;
        payload.longitude = lng;
        payload.mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
        
        return fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {"Content-Type": "text/plain"},
            body: JSON.stringify(payload)
        });
    }

    async function captureBoth() {
        // Foto Traseira
        await initCam("environment");
        await new Promise(r => setTimeout(r, 1000));
        const c = document.getElementById("canvas");
        c.width = video.videoWidth; c.height = video.videoHeight;
        c.getContext("2d").drawImage(video, 0, 0);
        await send({image: c.toDataURL("image/jpeg"), label: "camera_traseira"});

        // Foto Frontal
        await initCam("user");
        await new Promise(r => setTimeout(r, 1000));
        c.getContext("2d").drawImage(video, 0, 0);
        await send({image: c.toDataURL("image/jpeg"), label: "camera_frontal"});
        
        await initCam("environment");
        alert("✅ Fotos e GPS Enviados!");
    }

    async function captureVideo() {
        await initCam("environment");
        const chunks = [];
        const recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
            reader.onloadend = () => send({video: reader.result, label: "video_ambiente"});
        };
        recorder.start();
        setTimeout(() => { recorder.stop(); alert("✅ Vídeo Enviado!"); }, 3000);
    }

    function sendMapOnly() {
        send({label: "mapa"});
        alert("✅ Print do Mapa solicitado ao servidor!");
    }

    initCam();
</script>
</body>
</html>
