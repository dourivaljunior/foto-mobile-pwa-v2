<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura Forense V2</title>
  <style>
    body { font-family: Arial; padding: 16px; text-align:center; background:#f5f5f5; }
    video { width:100%; border-radius:16px; background:#000; min-height:240px; }
    .btn { width:100%; padding:16px; margin-top:12px; border:none; border-radius:12px; font-size:18px; }
    .foto { background:#dbeafe; }
    .video { background:#d1fae5; }
  </style>
</head>
<body>
  <h2>📸 Captura Forense V2</h2>
  <video id="video" autoplay playsinline muted></video>
  <button class="btn foto" onclick="captureDualPhotos()">📸 Foto dupla</button>
  <button class="btn video" onclick="recordTenSeconds()">🎥 Vídeo 10s</button>
  <canvas id="canvas" style="display:none"></canvas>
<script>
const video = document.getElementById("video");
let currentStream = null;

async function startCamera(mode) {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode }
  });

  video.srcObject = currentStream;
  await new Promise(resolve => setTimeout(resolve, 1000));
}

async function sendImage(image, label) {
  return fetch("https://script.google.com/macros/s/AKfycbyQ8iPf8fZ1iJ4q79mLQbKHXv4isuBhy92FaNLB-Q2LAIQYuiqb3ZB_c62bWTDMZIlEKQ/exec", {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({ image, label })
  });
}

async function capture() {
  const canvas = document.getElementById("canvas");

  // 📸 FOTO TRASEIRA
  await startCamera("environment");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  const rearImage = canvas.toDataURL("image/jpeg", 0.8);
  await sendImage(rearImage, "camera_traseira");

  // 🤳 FOTO FRONTAL
  await startCamera("user");
  canvas.getContext("2d").drawImage(video, 0, 0);
  const frontImage = canvas.toDataURL("image/jpeg", 0.8);
  await sendImage(frontImage, "camera_frontal");

  // 🔁 volta para traseira
  await startCamera("environment");

  alert("✅ Fotos frontal e traseira enviadas");
}

// inicia já com traseira
startCamera("environment");
</script>
</body>
</html>
