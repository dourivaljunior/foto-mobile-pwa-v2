<!DOCTYPE html>
<html>
<head> 
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comparação Google Maps</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    #mapImage {
      width: 100%;
      border-radius: 12px;
      margin-top: 16px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
      background: #dbeafe;
    }
  </style>
</head>
<body>
  <h2>🗺️ Google Maps Static + Captura</h2>

  <img id="mapImage" alt="Mapa da localização"/>

  <button onclick="captureMap()">
    📍 Capturar imagem do mapa
  </button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj9Bqd1jNqNqCx8uPEFABYbAOZ08g4nSjwcxgyTqhpxfqpjREv4YlDZuIBB2pqPeUOug/exec";

// 🔑 coloque aqui sua chave do Google Maps Static API
const GOOGLE_MAPS_KEY = "SUA_API_KEY_AQUI";

let currentLat = null;
let currentLng = null;

function loadGoogleMap(lat, lng) {
  const mapUrl =
    `https://maps.googleapis.com/maps/api/staticmap` +
    `?center=${lat},${lng}` +
    `&zoom=17` +
    `&size=800x400` +
    `&maptype=roadmap` +
    `&markers=color:red%7Clabel:C%7C${lat},${lng}` +
    `&key=${GOOGLE_MAPS_KEY}`;

  document.getElementById("mapImage").src = mapUrl;
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(position => {
    currentLat = position.coords.latitude;
    currentLng = position.coords.longitude;

    loadGoogleMap(currentLat, currentLng);
  });
}

async function captureMap() {
  try {
    const img = document.getElementById("mapImage");

    const response = await fetch(img.src);
    const blob = await response.blob();

    const reader = new FileReader();
    reader.onloadend = async () => {
      await fetch(SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          mapImage: reader.result,
          label: "mapa_google"
        })
      });

      alert("✅ Captura do mapa enviada");
    };

    reader.readAsDataURL(blob);

  } catch (error) {
    console.error(error);
    alert("❌ Erro ao capturar mapa");
  }
}

getLocation();
</script>
</body>
</html>
