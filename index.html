<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fotos + Vídeo</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
    }

    .photo-btn {
      background: #dbeafe;
    }

    .video-btn {
      background: #d1fae5;
    }
  </style>
</head>
<body>
  <h2>📸🎥 Fotos + Vídeo</h2>

  <video id="video" autoplay playsinline muted></video>

  <button class="photo-btn" onclick="captureBoth()">
    📸 Tirar frontal + traseira
  </button>

  <button class="video-btn" onclick="captureVideo()">
    🎥 Gravar vídeo 3s
  </button>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
let currentStream = null;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQ8iPf8fZ1iJ4q79mLQbKHXv4isuBhy92FaNLB-Q2LAIQYuiqb3ZB_c62bWTDMZIlEKQ/exec";

async function startCamera(mode = "environment") {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode },
    audio: false
  });

  video.srcObject = currentStream;
  await new Promise(resolve => setTimeout(resolve, 1000));
}

function captureImage() {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.8);
}

function sendPayload(payload) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
}

async function captureBoth() {
  try {
    await startCamera("environment");
    const rear = captureImage();
    await sendPayload({ image: rear, label: "camera_traseira" });

    await startCamera("user");
    const front = captureImage();
    await sendPayload({ image: front, label: "camera_frontal" });

    await startCamera("environment");

    alert("✅ Fotos enviadas");
  } catch (error) {
    console.error(error);
    alert("❌ Erro nas fotos");
  }
}

async function captureVideo() {
  try {
    await startCamera("environment");

    const chunks = [];
    const recorder = new MediaRecorder(currentStream, {
      mimeType: "video/webm"
    });

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = async () => {
      const blob = new Blob(chunks, { type: "video/webm" });

      const reader = new FileReader();
      reader.onloadend = async () => {
        await sendPayload({
          video: reader.result,
          label: "video_3s"
        });

        alert("✅ Vídeo enviado");
      };

      reader.readAsDataURL(blob);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 3000);

  } catch (error) {
    console.error(error);
    alert("❌ Erro no vídeo");
  }
}

startCamera("environment");
</script>
</body>
</html>
