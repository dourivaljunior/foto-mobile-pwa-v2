<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Monitoramento Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 15px; background: #000; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-map { background: #f59e0b; color: white; grid-column: span 2; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 12px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <video id="v" autoplay playsinline muted></video>
    <div class="grid">
        <button class="btn-blue" onclick="executarFotos()">📸 FOTOS</button>
        <button class="btn-green" onclick="executarVideo()">🎥 VÍDEO</button>
        <button class="btn-map" onclick="enviarTudo()">📍 ENVIAR TUDO AGORA</button>
    </div>
    <div id="status">Aguardando comando...</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbyRes_BZrGLaLpBCFLnt3PZ6sHzxlf_q3JmN2diADGU/dev";
    const v = document.getElementById("v");
    const s = document.getElementById("status");
    let lat = 0, lng = 0;

    // Iniciar GPS e Câmera
    navigator.geolocation.watchPosition(p => { lat = p.coords.latitude; lng = p.coords.longitude; });
    
    async function ligarCam(mode) {
        if(window.stream) window.stream.getTracks().forEach(t => t.stop());
        window.stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
        v.srcObject = window.stream;
        await new Promise(r => setTimeout(r, 1000));
    }

    async function enviar(payload) {
        s.innerText = "Enviando dados...";
        payload.latitude = lat;
        payload.longitude = lng;
        payload.mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

        try {
            await fetch(URL_GAS, {
                method: "POST",
                mode: "no-cors", // Crucial para evitar erro de redirecionamento do Google
                body: JSON.stringify(payload)
            });
            s.innerText = "✅ Enviado com sucesso!";
        } catch (e) {
            s.innerText = "❌ Erro no envio.";
        }
    }

    async function tirarFoto() {
        const canvas = document.getElementById("c");
        canvas.width = v.videoWidth;
        canvas.height = v.videoHeight;
        canvas.getContext("2d").drawImage(v, 0, 0);
        return canvas.toDataURL("image/jpeg", 0.6);
    }

    async function executarFotos() {
        await ligarCam("environment");
        const f1 = await tirarFoto();
        await enviar({image: f1, label: "TRASEIRA"});
        
        await ligarCam("user");
        const f2 = await tirarFoto();
        await enviar({image: f2, label: "FRONTAL"});
        await ligarCam("environment");
    }

    async function executarVideo() {
        await ligarCam("environment");
        const chunks = [];
        const rec = new MediaRecorder(window.stream);
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => enviar({video: reader.result, label: "VIDEO"});
        };
        rec.start();
        s.innerText = "Gravando vídeo...";
        setTimeout(() => rec.stop(), 3000);
    }

    async function enviarTudo() {
        await enviar({label: "mapa"});
    }

    ligarCam("environment");
</script>
</body>
</html>
