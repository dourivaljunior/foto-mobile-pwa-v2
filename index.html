<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura Forense V2</title>
  <style>
    body { font-family: Arial; padding: 16px; text-align:center; background:#f5f5f5; }
    video { width:100%; border-radius:16px; background:#000; min-height:240px; }
    .btn { width:100%; padding:16px; margin-top:12px; border:none; border-radius:12px; font-size:18px; }
    .foto { background:#dbeafe; }
    .video { background:#d1fae5; }
  </style>
</head>
<body>
  <h2>📸 Captura Forense V2</h2>
  <video id="video" autoplay playsinline muted></video>
  <button class="btn foto" onclick="captureDualPhotos()">📸 Foto dupla</button>
  <button class="btn video" onclick="recordTenSeconds()">🎥 Vídeo 10s</button>
  <canvas id="canvas" style="display:none"></canvas>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-4AVZZ4cNWjeQJbl-Aqg-yyWo8Epznts575kqydhQ7b6I5s2mLDkOgBimHxpDNoqkSA/exec";
const video = document.getElementById("video");
let currentStream = null;

async function initCamera(facing = "environment", audio = false) {
  try {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing },
      audio
    });

    video.srcObject = currentStream;
    await video.play();

    // pequena estabilização igual à V1 que funcionou
    await new Promise(r => setTimeout(r, 1000));
  } catch (err) {
    alert("❌ Erro ao abrir câmera: " + err.message);
    throw err;
  }
}

function getLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve({ lat: null, lng: null }),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}

function captureFrame(label, gps) {
  const canvas = document.getElementById("canvas");
  const width = video.videoWidth || 1280;
  const height = video.videoHeight || 720;
  canvas.width = width;
  canvas.height = height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, width, height);

  const stamp = `${label} | ${new Date().toLocaleString()} | ${gps.lat},${gps.lng}`;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, height - 50, width, 50);
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText(stamp, 10, height - 18);

  return canvas.toDataURL("image/jpeg", 0.9);
}

async function sendPayload(payload) {
  const response = await fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
  return response.text();
}

async function captureDualPhotos() {
  const gps = await getLocation();

  await initCamera("environment", false);
  const rear = captureFrame("camera_traseira", gps);
  await sendPayload({ type: "photo_single", gps, label: "camera_traseira", image: rear });

  await initCamera("user", false);
  const front = captureFrame("camera_frontal", gps);
  await sendPayload({ type: "photo_single", gps, label: "camera_frontal", image: front });

  // volta para traseira no final
  await initCamera("environment", false);
  alert("✅ Fotos frontal e traseira enviadas");
}

async function recordTenSeconds() {
  const gps = await getLocation();
  await initCamera("environment", true);

  const chunks = [];
  const recorder = new MediaRecorder(currentStream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const reader = new FileReader();
    reader.onloadend = async () => {
      await sendPayload({ type: "video", gps, video: reader.result });
      await initCamera("environment", false);
      alert("✅ Vídeo enviado");
    };
    reader.readAsDataURL(blob);
  };

  recorder.start();
  setTimeout(() => recorder.stop(), 10000);
}

// inicialização simples e confiável
window.onload = () => {
  initCamera("environment", false);
};
</script>
</body>
</html>
