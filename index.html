<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Google</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; }
        button { width: 100%; max-width: 400px; padding: 20px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        #log { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>📡 Monitoramento Remoto</h2>
    <video id="video" autoplay playsinline muted></video>
    
    <button class="btn-blue" onclick="capturarFotos()">📸 CAPTURAR FOTOS (F+T)</button>
    <button class="btn-green" onclick="capturarVideo()">🎥 GRAVAR VÍDEO (3s)</button>
    <button class="btn-orange" onclick="enviarLocalizacao()">📍 ENVIAR MAPA + GPS</button>
    
    <div id="log">Aguardando...</div>
    <canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuAt3TNC7PfbRysSp8GXu750I4smVO5L3iNRfe-QrQJVHgMB_WRfKlUoDUom6-MrNzyg/exec";
    const video = document.getElementById("video");
    const log = document.getElementById("log");
    let lat, lng, stream;

    // Iniciar Câmera e GPS
    async function start() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            navigator.geolocation.watchPosition(p => {
                lat = p.coords.latitude;
                lng = p.coords.longitude;
                log.innerText = `GPS OK: ${lat}, ${lng}`;
            });
        } catch (e) { log.innerText = "Erro ao iniciar: " + e; }
    }

    async function changeCam(mode) {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
        video.srcObject = stream;
        await new Promise(r => setTimeout(r, 1000));
    }

    async function enviar(payload) {
        log.innerText = "Enviando...";
        payload.latitude = lat;
        payload.longitude = lng;
        payload.mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

        return fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Necessário para Google Scripts
            cache: "no-cache",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        }).then(() => log.innerText = "✅ Enviado!");
    }

    async function capturarFotos() {
        const c = document.getElementById("canvas");
        const ctx = c.getContext("2d");

        await changeCam("environment");
        c.width = video.videoWidth; c.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "TRASEIRA"});

        await changeCam("user");
        ctx.drawImage(video, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "FRONTAL"});
        
        await changeCam("environment");
    }

    async function capturarVideo() {
        const chunks = [];
        const recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
            reader.onloadend = () => enviar({video: reader.result});
        };
        recorder.start();
        setTimeout(() => recorder.stop(), 3000);
    }

    function enviarLocalizacao() {
        enviar({tipo: "mapa"});
    }

    start();
</script>
</body>
</html>
