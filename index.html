<!DOCTYPE html>
<html>
<head> 
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fotos + Vídeo Fiel</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
    }

    .photo-btn {
      background: #dbeafe;
    }

    .video-btn {
      background: #d1fae5;
    }
  </style>
</head>
<body>
  <h2>📸🎥 Monitoramento Remoto Pela Camera do Aparelho Celular </br>Envio e Armazenamento de Arquivos Para o Google Drive </h2>

  <video id="video" autoplay playsinline muted></video>

  <button class="photo-btn" onclick="captureBoth()">
    📸 Foto
  </button>

  <button class="video-btn" onclick="captureVideo()">
    🎥 Vídeo
  </button>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj9Bqd1jNqNqCx8uPEFABYbAOZ08g4nSjwcxgyTqhpxfqpjREv4YlDZuIBB2pqPeUOug/exec"
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

let currentStream = null;

async function startCamera(mode = "environment") {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode },
    audio: false
  });

  video.srcObject = currentStream;
  await video.play();

  // mesmo tempo de estabilização do script que funcionou
  await new Promise(resolve => setTimeout(resolve, 1000));
}

function captureImage() {
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.8);
}

function sendPayload(payload) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
}

async function captureBoth() {
  try {
    await startCamera("environment");
    const rear = captureImage();
    await sendPayload({ image: rear, label: "camera_traseira" });

    await startCamera("user");
    const front = captureImage();
    await sendPayload({ image: front, label: "camera_frontal" });

    await startCamera("environment");

    alert("✅ Fotos enviadas");
  } catch (error) {
    console.error(error);
    alert("❌ Erro nas fotos");
  }
}

async function captureVideo() {
  try {
    await startCamera("environment");

    const chunks = [];
    const recorder = new MediaRecorder(currentStream);

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const reader = new FileReader();

      reader.onloadend = async () => {
        try {
          await sendPayload({
            video: reader.result,
            label: "video"
          });

          alert("✅ Vídeo enviado ao Drive");
        } catch (e) {
          alert("❌ Falha no upload do vídeo");
        }
      };

      reader.readAsDataURL(blob);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 2000);

  } catch (error) {
    console.error(error);
    alert("❌ Erro ao gravar vídeo");
  }
}

startCamera("environment");
</script>
</body>
</html>
