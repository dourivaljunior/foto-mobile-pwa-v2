<!DOCTYPE html>
<html>
<head> 
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitoramento Via Aparelho Celular</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
    }

    .photo-btn { background: #dbeafe; }
    .video-btn { background: #d1fae5; }
    .map-btn { background: #fde68a; }

    #map {
      height: 300px;
      width: 100%;
      margin-top: 16px;
      border-radius: 12px;
    }

    #coords {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>📸🎥📍 Monitoramento Remoto + GPS 🚗</h2>

  <video id="video" autoplay playsinline muted></video>

  <button class="photo-btn" onclick="captureBoth()">📸 Foto</button>
  <button class="video-btn" onclick="captureVideo()">🎥 Vídeo</button>

  <div id="coords">📍 Obtendo localização...</div>
  <div id="map"></div>

  <button class="map-btn" onclick="captureMap()">🗺️ Mapa</button>

  <canvas id="canvas" style="display:none;"></canvas>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj9Bqd1jNqNqCx8uPEFABYbAOZ08g4nSjwcxgyTqhpxfqpjREv4YlDZuIBB2pqPeUOug/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const coordsDiv = document.getElementById("coords");

let currentStream = null;
let currentLat = null;
let currentLng = null;
let map, marker;

async function startCamera(mode = "environment") {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode },
    audio: false
  });

  video.srcObject = currentStream;
  await video.play();
  await new Promise(resolve => setTimeout(resolve, 1000));
}

function initMap(lat, lng) {
  if (!map) {
    map = L.map("map").setView([lat, lng], 17);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    const carIcon = L.divIcon({
      html: '<div style="font-size:32px;">🚗</div>',
      className: ""
    });

    marker = L.marker([lat, lng], { icon: carIcon }).addTo(map);
  } else {
    map.setView([lat, lng], 17);
    marker.setLatLng([lat, lng]);
  }
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(position => {
    currentLat = position.coords.latitude;
    currentLng = position.coords.longitude;

    coordsDiv.innerHTML =
      `📍 Latitude: ${currentLat.toFixed(6)} | Longitude: ${currentLng.toFixed(6)}`;

    initMap(currentLat, currentLng);
  });
}

function captureImage() {
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.8);
}

function sendPayload(payload) {
  payload.latitude = currentLat;
  payload.longitude = currentLng;
  payload.mapLink = `https://www.google.com/maps?q=${currentLat},${currentLng}`;

  return fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });
}

async function captureBoth() {
  try {
    getLocation();

    await startCamera("environment");
    const rear = captureImage();
    await sendPayload({ image: rear, label: "camera_traseira" });

    await startCamera("user");
    const front = captureImage();
    await sendPayload({ image: front, label: "camera_frontal" });

    await startCamera("environment");

    alert("✅ Fotos + GPS enviados");
  } catch (error) {
    console.error(error);
    alert("❌ Erro nas fotos");
  }
}

async function captureVideo() {
  try {
    getLocation();
    await startCamera("environment");

    const chunks = [];
    const recorder = new MediaRecorder(currentStream);

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const reader = new FileReader();

      reader.onloadend = async () => {
        try {
          await sendPayload({
            video: reader.result,
            label: "video"
          });

          alert("✅ Vídeo + GPS enviados");
        } catch (e) {
          alert("❌ Falha no upload do vídeo");
        }
      };

      reader.readAsDataURL(blob);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 2000);

  } catch (error) {
    console.error(error);
    alert("❌ Erro ao gravar vídeo");
  }
}

async function captureMap() {
  try {
    if (!currentLat || !currentLng) {
      alert("❌ GPS ainda não carregou");
      return;
    }

    const mapUrl =
      `https://staticmap.openstreetmap.de/staticmap.php` +
      `?center=${currentLat},${currentLng}` +
      `&zoom=17` +
      `&size=800x400` +
      `&markers=${currentLat},${currentLng},red-pushpin`;

    await sendPayload({
      mapImage: mapUrl,
      label: "mapa"
    });

    alert("✅ Mapa + GPS enviados");
  } catch (error) {
    console.error(error);
    alert("❌ Erro ao enviar mapa");
  }
}

startCamera("environment");
getLocation();
</script>
</body>
</html>
