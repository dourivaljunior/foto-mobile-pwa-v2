<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura Automática V2</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
      background: #f7f7f7;
    }

    h2 {
      margin-bottom: 16px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
      min-height: 260px;
    }

    button {
      width: 100%;
      padding: 22px;
      font-size: 24px;
      font-weight: bold;
      margin-top: 18px;
      border: none;
      border-radius: 14px;
      color: white;
      background: red;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <h2>📸🎥 Captura Automática</h2>

  <video id="video" autoplay playsinline muted></video>

  <button id="startBtn">🔴 INICIAR</button>

  <canvas id="canvas" style="display:none;"></canvas>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfwZM3hadJYyswOx-0hFE6Y63GoCsetplzwyYYuPe9b5o1f6NdoVEF9cEolt1caTFg/exec";

const video = document.getElementById("video");
const btn = document.getElementById("startBtn");
const canvas = document.getElementById("canvas");

let stream = null;
let busy = false;

async function openCamera(mode = "environment", withAudio = false) {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode },
    audio: withAudio
  });

  video.srcObject = stream;

  await new Promise(resolve => setTimeout(resolve, 1000));
}

function takePhoto() {
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  return canvas.toDataURL("image/jpeg", 0.75);
}

async function upload(payload) {
  const response = await fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });

  return response.text();
}

async function recordVideo5s() {
  await openCamera("environment", false);

  return new Promise((resolve, reject) => {
    const chunks = [];

    let recorder;
    try {
      recorder = new MediaRecorder(stream, {
        mimeType: "video/webm",
        videoBitsPerSecond: 200000
      });
    } catch (e) {
      reject(new Error("MediaRecorder não suportado"));
      return;
    }

    recorder.ondataavailable = e => {
      if (e.data.size > 0) {
        chunks.push(e.data);
      }
    };

    recorder.onerror = () => reject(new Error("Erro na gravação"));

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });

      if (blob.size > 5 * 1024 * 1024) {
        reject(new Error("Vídeo acima de 5MB"));
        return;
      }

      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    };

    recorder.start();

    setTimeout(() => {
      recorder.stop();
    }, 2000);
  });
}

async function processCapture() {
  if (busy) return;

  busy = true;
  btn.style.background = "green";
  btn.textContent = "🟢 PROCESSANDO...";

  try {
    // 📸 traseira
    await openCamera("environment");
    const rear = takePhoto();
    await upload({
      image: rear,
      label: "camera_traseira"
    });

    // 🤳 frontal
    await openCamera("user");
    const front = takePhoto();
    await upload({
      image: front,
      label: "camera_frontal"
    });

    // 🎥 vídeo 5s
    const videoData = await recordVideo5s();
    await upload({
      video: videoData,
      label: "video_5s"
    });

    alert("✅ Processo concluído com sucesso");

  } catch (error) {
    alert("❌ " + error.message);
  }

  btn.style.background = "red";
  btn.textContent = "🔴 INICIAR";
  busy = false;

  await openCamera("environment");
}

btn.addEventListener("click", processCapture);

// inicia preview
openCamera("environment");
</script>
</body>
</html>
