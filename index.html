<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Monitoramento Mobile</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 15px; }
        .box { background: #222; padding: 20px; border-radius: 20px; border: 1px solid #444; }
        video { width: 100%; border-radius: 10px; background: #000; }
        button { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .b-blue { background: #2563eb; color: #fff; }
        .b-green { background: #16a34a; color: #fff; }
        .b-orange { background: #ea580c; color: #fff; }
        #log { font-size: 12px; color: #888; margin-top: 10px; }
        #map-preview { width: 100%; height: 200px; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3>📸 Sistema de Monitoramento</h3>
    <video id="video" autoplay playsinline muted></video>
    
    <button class="b-blue" onclick="capturarFotos()">📸 CAPTURAR FOTOS (F+T)</button>
    <button class="b-green" onclick="capturarVideo()">🎥 GRAVAR VÍDEO (3s)</button>
    
    <div id="log">Aguardando GPS...</div>
    <div id="map-preview"></div>
    
    <button class="b-orange" onclick="enviarMapa()">📍 ENVIAR MAPA ATUAL</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuAt3TNC7PfbRysSp8GXu750I4smVO5L3iNRfe-QrQJVHgMB_WRfKlUoDUom6-MrNzyg/exec";
    const v = document.getElementById("video");
    const log = document.getElementById("log");
    let lat, lng, stream;

    // Inicializa GPS e Câmera
    async function init() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            v.srcObject = stream;
            navigator.geolocation.watchPosition(p => {
                lat = p.coords.latitude;
                lng = p.coords.longitude;
                log.innerText = `GPS OK: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                document.getElementById("map-preview").innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed"></iframe>`;
            });
        } catch (e) { log.innerText = "Erro: Sem permissão de câmera/GPS"; }
    }

    async function ligarCam(mode) {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
        v.srcObject = stream;
        await new Promise(r => setTimeout(r, 1000));
    }

    async function enviar(dados) {
        log.innerText = "Enviando para o Drive...";
        dados.latitude = lat;
        dados.longitude = lng;
        dados.mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

        return fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // ESSENCIAL PARA FUNCIONAR NO CELULAR
            cache: "no-cache",
            body: JSON.stringify(dados)
        }).then(() => log.innerText = "✅ Enviado com sucesso!");
    }

    async function capturarFotos() {
        const c = document.getElementById("canvas");
        const ctx = c.getContext("2d");

        await ligarCam("environment");
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "TRASEIRA"});

        await ligarCam("user");
        ctx.drawImage(v, 0, 0);
        await enviar({image: c.toDataURL("image/jpeg"), label: "FRONTAL"});
        
        await ligarCam("environment");
    }

    async function capturarVideo() {
        await ligarCam("environment");
        const chunks = [];
        const recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
            reader.onloadend = () => enviar({video: reader.result, label: "VIDEO"});
        };
        recorder.start();
        setTimeout(() => recorder.stop(), 3000);
    }

    function enviarMapa() {
        if(!lat) return alert("GPS ainda não capturado!");
        enviar({tipo: "mapa"});
    }

    init();
</script>
</body>
</html>
