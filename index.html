<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura Forense V2</title>
  <style>
    body { font-family: Arial; padding: 16px; text-align:center; background:#f5f5f5; }
    video { width:100%; border-radius:16px; background:#000; }
    .btn { width:100%; padding:16px; margin-top:12px; border:none; border-radius:12px; font-size:18px; }
    .foto { background:#dbeafe; }
    .video { background:#d1fae5; }
  </style>
</head>
<body>
  <h2>📸 Captura Forense V2</h2>
  <video id="video" autoplay playsinline muted></video>
  <button class="btn foto" onclick="captureDualPhotos()">📸 Foto dupla</button>
  <button class="btn video" onclick="recordTenSeconds()">🎥 Vídeo 10s</button>
  <canvas id="canvas" style="display:none"></canvas>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKdbsCZuUyyMzVjLbYSpJXdwjqKJA14bXf1PyDq3nBYVNl2a9mAiaDHFR7l04Tg3JIfg/exec
";
const video = document.getElementById("video");
let currentStream = null;

async function startCamera(facing = "environment", withAudio = false) {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: facing } },
    audio: withAudio
  });

  video.srcObject = currentStream;

  await new Promise((resolve) => {
    video.onloadedmetadata = () => {
      video.play();
      setTimeout(resolve, 800);
    };
  });
}

function getLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve({ lat: null, lng: null }),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}

function stampAndCapture(label, gps) {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const stamp = `${label} | ${new Date().toLocaleString()} | ${gps.lat},${gps.lng}`;
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, canvas.height - 46, canvas.width, 46);
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText(stamp, 12, canvas.height - 16);

  return canvas.toDataURL("image/jpeg", 0.9);
}

async function sendPayload(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return res.text();
}

async function captureDualPhotos() {
  try {
    const gps = await getLocation();

    await startCamera("environment", false);
    const rear = stampAndCapture("camera_traseira", gps);
    const r1 = await sendPayload({ type: "photo_single", gps, label: "camera_traseira", image: rear });

    await startCamera("user", false);
    const front = stampAndCapture("camera_frontal", gps);
    const r2 = await sendPayload({ type: "photo_single", gps, label: "camera_frontal", image: front });

    alert("✅ Fotos enviadas: " + r1 + " | " + r2);
  } catch (e) {
    alert("❌ Erro foto: " + e.message);
  }
}

async function recordTenSeconds() {
  try {
    const gps = await getLocation();
    await startCamera("environment", true);

    const chunks = [];
    const recorder = new MediaRecorder(currentStream, {
      mimeType: "video/webm;codecs=vp8",
      videoBitsPerSecond: 500000
    });

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = async () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const reader = new FileReader();
      reader.onloadend = async () => {
        const result = await sendPayload({
          type: "video",
          gps,
          video: reader.result
        });
        alert("✅ Vídeo enviado: " + result);
      };
      reader.readAsDataURL(blob);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 10000);
  } catch (e) {
    alert("❌ Erro vídeo: " + e.message);
  }
}

startCamera();
</script>
</body>
</html>
